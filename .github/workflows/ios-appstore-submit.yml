name: iOS App Store Submit

on:
  workflow_dispatch:
    inputs:
      app_version:
        description: "App version to submit (e.g. 1.0)"
        required: true
        type: string
      build_number:
        description: "Build number already uploaded to TestFlight"
        required: true
        type: string

permissions:
  contents: read

jobs:
  submit:
    name: Submit Existing Build to App Store
    runs-on: macos-15
    environment: appstore
    env:
      BUNDLE_GEMFILE: iosApp/Gemfile
      ASC_KEY_ID: ${{ secrets.ASC_KEY_ID }}
      ASC_ISSUER_ID: ${{ secrets.ASC_ISSUER_ID }}
      ASC_API_KEY_P8: ${{ secrets.ASC_API_KEY_P8 }}
      APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
      APP_BUNDLE_ID: ${{ secrets.APP_BUNDLE_ID }}
      APPSTORE_APPLE_ID: ${{ secrets.APPSTORE_APPLE_ID }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Preflight required secrets
        shell: bash
        run: |
          set -euo pipefail
          required=(
            ASC_KEY_ID
            ASC_ISSUER_ID
            ASC_API_KEY_P8
            APPLE_TEAM_ID
            APP_BUNDLE_ID
            APPSTORE_APPLE_ID
          )
          missing=()
          for name in "${required[@]}"; do
            value="${!name:-}"
            if [[ -z "${value// }" ]]; then
              missing+=("$name")
            fi
          done
          if (( ${#missing[@]} > 0 )); then
            printf 'Missing required secrets: %s\n' "${missing[*]}"
            exit 1
          fi

      - name: Select Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Setup Ruby and Bundler
        uses: ruby/setup-ruby@v1
        with:
          bundler-cache: true

      - name: Submit to App Store review
        working-directory: iosApp
        run: |
          bundle exec fastlane ios submit \
            app_version:${{ inputs.app_version }} \
            build_number:${{ inputs.build_number }}

      - name: Submission summary
        if: success()
        run: |
          echo "## iOS App Store submission completed" >> "$GITHUB_STEP_SUMMARY"
          echo "- Version: ${{ inputs.app_version }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- Build: ${{ inputs.build_number }}" >> "$GITHUB_STEP_SUMMARY"
